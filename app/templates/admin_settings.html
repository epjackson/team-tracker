{% extends "base.html" %}
{% block title %}Admin — Settings{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-white mb-0"><i class="bi bi-gear me-2"></i>Settings</h2>
    <div class="d-flex gap-2">
        <a href="{{ url_for('activity') }}" class="btn btn-outline-light btn-sm">
            <i class="bi bi-clock-history me-1"></i>Activity
        </a>
        <a href="{{ url_for('admin_users') }}" class="btn btn-outline-light btn-sm">
            <i class="bi bi-people me-1"></i>Users
        </a>
    </div>
</div>

<div class="row g-4">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-sliders me-2"></i>Feature toggles
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('save_admin_settings') }}">
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="enableActivity"
                               name="enable_activity_feature" value="1"
                               {% if enable_activity_feature %}checked{% endif %}>
                        <label class="form-check-label" for="enableActivity">
                            <strong>Activity Feature</strong>
                            <div class="small text-muted mt-1">
                                Show the Activity page in the navigation menu to display login sessions.
                                When disabled, only admins can access it at <code>/activity</code>.
                            </div>
                        </label>
                    </div>
                    <button type="submit" class="btn btn-tennis">
                        <i class="bi bi-check-circle me-1"></i>Save Settings
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
