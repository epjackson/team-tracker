{% extends "base.html" %}
{% block title %}Edit {{ player.name }} — Team Tracker{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('player_summary') }}" class="text-white-50 text-decoration-none me-3">
        <i class="bi bi-arrow-left me-1"></i>Players
    </a>
    <h2 class="text-white mb-0"><i class="bi bi-pencil me-2"></i>Edit Player</h2>
</div>

<div class="row justify-content-center">
    <div class="col-md-10 col-lg-8">
        <div class="card">
            <div class="card-header">
                {{ player.name }}
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('edit_player', player_id=player.id) }}">
                    <div class="row g-3">

                        <div class="col-md-6">
                            <label for="first_name" class="form-label">First Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="first_name" name="first_name"
                                   value="{{ player.first_name }}" required autofocus>
                        </div>
                        <div class="col-md-6">
                            <label for="last_name" class="form-label">Last Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="last_name" name="last_name"
                                   value="{{ player.last_name }}" required>
                        </div>

                        <div class="col-md-4">
                            <label for="gender" class="form-label">Gender <span class="text-danger">*</span></label>
                            <select class="form-select" id="gender" name="gender" required>
                                <option value="">Select…</option>
                                <option value="M" {% if player.gender == 'M' %}selected{% endif %}>M — Male</option>
                                <option value="F" {% if player.gender == 'F' %}selected{% endif %}>F — Female</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label for="membership_status" class="form-label">Membership Status <span class="text-danger">*</span></label>
                            <select class="form-select" id="membership_status" name="membership_status" required>
                                <option value="">Select…</option>
                                <option value="active" {% if player.membership_status == 'active' %}selected{% endif %}>Active</option>
                                <option value="inactive" {% if player.membership_status == 'inactive' %}selected{% endif %}>Inactive</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label for="interest_team_play" class="form-label">Interest in Team Play <span class="text-danger">*</span></label>
                            <select class="form-select" id="interest_team_play" name="interest_team_play" required>
                                <option value="">Select…</option>
                                <option value="yes" {% if player.interest_team_play == 'yes' %}selected{% endif %}>Yes</option>
                                <option value="no" {% if player.interest_team_play == 'no' %}selected{% endif %}>No</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label for="lta_number" class="form-label">LTA Number <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="lta_number" name="lta_number"
                                   value="{{ player.lta_number }}" required>
                        </div>

                        {# ── Frozen fields ────────────────────────────────── #}
                        <div class="col-md-6">
                            <label for="contact_telephone" class="form-label d-flex align-items-center gap-2">
                                Contact Telephone
                                <span class="badge bg-secondary" style="font-size:0.65rem; font-weight:500; letter-spacing:.5px;">
                                    <i class="bi bi-lock me-1"></i>Coming soon
                                </span>
                            </label>
                            <input type="text" class="form-control bg-light text-muted" id="contact_telephone"
                                   disabled placeholder="Not yet available">
                        </div>

                        <div class="col-12">
                            <label for="miscellaneous" class="form-label d-flex align-items-center gap-2">
                                Miscellaneous
                                <span class="badge bg-secondary" style="font-size:0.65rem; font-weight:500; letter-spacing:.5px;">
                                    <i class="bi bi-lock me-1"></i>Coming soon
                                </span>
                            </label>
                            <textarea class="form-control bg-light text-muted" id="miscellaneous"
                                      rows="2" disabled placeholder="Not yet available"></textarea>
                        </div>

                    </div>

                    <div class="mt-4 d-flex justify-content-between align-items-center">
                        <a href="{{ url_for('player_summary') }}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-tennis">
                            <i class="bi bi-check-lg me-1"></i>Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
